<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Wolex</title>

    <link rel="stylesheet" href="../styles/style.css">
  </head>

  <body>
    <div class="dashboard">
      <!-- Sidebar -->
      <aside class="sidebar">
        <h2 class="logo">Wolex</h2>

        <nav>
          <a href="dashboard.html">Dashboard</a>
          <a href="transactions.html">Transactions</a>
          <a href="budgets.html">Budgets</a>
          <a href="chatbot.html">AI Insights</a>
          <a href="settings.html">Settings</a>
        </nav>
      </aside>

      <!-- Main Content -->
      <main class="main-content">
        <header class="dashboard-header">
          <h1 id="welcome-text">Welcome</h1>
        </header>

        <!-- Summary Cards -->
        <section class="summary-cards">
          <div class="card">
            <h3>Total Balance</h3>
            <p id="balance">--</p>
          </div>

          <div class="card">
            <h3>Monthly Spending</h3>
            <p id="spending">--</p>
          </div>

          <div class="card">
            <h3>AI Insight</h3>
            <p id="ai-insight">Loading insight...</p>
          </div>
        </section>

        <!-- Chart -->
        <section class="chart-section">
          <h2>Spending Overview</h2>

          <div class="chart-placeholder">Chart will appear here</div>
        </section>

        <!-- Transactions -->
        <section class="transactions">
          <h2>Recent Transactions</h2>

          <ul id="transaction-list">
            <li>Loading transactions...</li>
          </ul>

          <a href="transactions.html">See all</a>
        </section>
      </main>
    </div>

    <script src="../scripts/dashboard.js"></script>
  </body>
</html>
